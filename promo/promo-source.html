<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Couch Controller — Promo</title>
<style>
  :root{
    --ink:#0d0b14; --den:#17131f; --panel:#1d1729; --panel2:#241d33;
    --line:#3a3153; --brand:#7c6cff; --brand-soft:#a89cff; --lilac:#c9c2ff;
    --tv:#f2f0fa; --dim:#8f86b8; --green:#2fa96b;
    --btnA:#59c87a; --btnB:#e0645f; --btnX:#5f8fe0; --btnY:#e0c05f;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:#000;}
  #stage{
    position:fixed; left:0; top:0; width:1280px; height:720px; overflow:hidden;
    background:
      radial-gradient(1100px 700px at 50% 118%, #241d3a 0%, transparent 60%),
      radial-gradient(900px 600px at 82% -12%, #1b1530 0%, transparent 55%),
      linear-gradient(180deg, #0e0c16 0%, #0d0b14 55%, #0a0810 100%);
    font-family:"Segoe UI", system-ui, sans-serif; color:var(--tv);
  }
  .disp{font-family:"Bahnschrift","Segoe UI",sans-serif; font-stretch:80%;}
  .scene{position:absolute; inset:0; opacity:0; visibility:hidden;}
  .cw{position:absolute; inset:0; transform-origin:0 0;}

  /* ---------- ambient / finishing ---------- */
  #vignette{position:absolute; inset:0; pointer-events:none; z-index:60;
    background:radial-gradient(115% 95% at 50% 46%, transparent 58%, rgba(3,2,8,.55) 100%);}
  #flash{position:absolute; inset:0; z-index:59; pointer-events:none; opacity:0;
    background:radial-gradient(70% 70% at 50% 60%, rgba(124,108,255,.28), transparent 70%);}
  #fade{position:absolute; inset:0; z-index:70; background:#000; opacity:0; pointer-events:none;}
  .amb{position:absolute; border-radius:50%; filter:blur(90px); pointer-events:none;}

  /* ---------- logo tile ---------- */
  .logoTile{position:relative; width:150px; height:150px; border-radius:34px;
    background:linear-gradient(160deg,#8d7dff 0%, #6d5cf0 100%);
    box-shadow:0 24px 70px -12px rgba(124,108,255,.55), inset 0 2px 0 rgba(255,255,255,.35);}
  .logoTile svg{position:absolute; inset:0;}

  /* ---------- chips (game-HUD control hints) ---------- */
  .chip{position:absolute; left:56px; bottom:52px; z-index:40; display:flex; align-items:center; gap:14px; opacity:0;
    background:rgba(16,12,26,.82); border:1px solid rgba(124,108,255,.35);
    border-radius:14px; padding:12px 22px 12px 14px; backdrop-filter:blur(6px);
    box-shadow:0 12px 40px -8px rgba(0,0,0,.7);}
  .chip .glyph{display:flex; align-items:center; justify-content:center; min-width:40px; height:40px;
    padding:0 10px; border-radius:11px; background:var(--panel2); border:1px solid var(--line);
    font-family:"Bahnschrift","Segoe UI",sans-serif; font-weight:700; font-size:19px; color:#fff;}
  .chip .glyph.round{border-radius:50%; width:40px; padding:0;}
  .chip .txt{font-size:21px; font-weight:600; letter-spacing:.4px; color:var(--lilac);}
  .chip .txt b{color:#fff;}

  /* ---------- browser mockup ---------- */
  .browser{position:absolute; background:#100d1a; border-radius:16px; overflow:hidden;
    border:1px solid #2c2542; box-shadow:0 40px 120px -20px rgba(0,0,0,.85), 0 0 0 1px rgba(255,255,255,.03) inset;}
  .b-tabs{display:flex; align-items:flex-end; gap:2px; height:44px; padding:8px 12px 0; background:#0b0913;}
  .tab{display:flex; align-items:center; gap:9px; height:36px; padding:0 16px; min-width:0;
    border-radius:10px 10px 0 0; background:transparent; color:var(--dim); font-size:14.5px; white-space:nowrap;}
  .tab.on{background:#1d1729; color:var(--tv);}
  .tab .fav{width:12px; height:12px; border-radius:4px; flex:none;}
  .tab .x{margin-left:6px; opacity:.5; font-size:13px;}
  .b-bar{display:flex; align-items:center; gap:12px; height:44px; padding:0 16px; background:#1d1729; border-bottom:1px solid #2c2542;}
  .b-bar .nav{display:flex; gap:10px;}
  .b-bar .nav i{width:15px; height:15px; border-radius:50%; background:#332b4d; display:block;}
  .url{flex:1; height:29px; border-radius:15px; background:#13101f; border:1px solid #2c2542;
    display:flex; align-items:center; padding:0 14px; font-size:13.5px; color:var(--dim); gap:8px;}
  .url .lock{width:9px;height:11px;border:1.6px solid #4c4370;border-radius:2.5px;border-top-width:5px;}
  .puzzle{width:22px;height:22px;border-radius:6px;background:linear-gradient(160deg,#8d7dff,#6d5cf0);flex:none;}
  .b-view{position:relative; overflow:hidden; background:#0d0a16;}

  /* ---------- video player ---------- */
  .player{position:absolute; inset:0; background:#05040a; overflow:hidden;}
  .vid-art{position:absolute; inset:0; overflow:hidden;}
  .sun{position:absolute; width:220px; height:220px; border-radius:50%;
    background:radial-gradient(circle at 50% 42%, #ffd9a0 0%, #ff9d76 45%, #e86a8a 78%, transparent 79%);
    filter:blur(1px);}
  .mtn{position:absolute; bottom:-4px; width:120%; left:-10%; height:46%;}
  .haze{position:absolute; inset:0; background:linear-gradient(180deg, rgba(20,10,40,.0) 30%, rgba(10,6,22,.75) 100%);}
  .center-ic{position:absolute; left:50%; top:50%; width:120px; height:120px; margin:-60px 0 0 -60px;
    border-radius:50%; background:rgba(12,9,22,.72); border:2px solid rgba(255,255,255,.25);
    display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px);}
  .center-ic svg{width:52px; height:52px;}
  .p-controls{position:absolute; left:0; right:0; bottom:0; padding:14px 22px 16px;
    background:linear-gradient(transparent, rgba(4,3,9,.88) 55%); display:flex; flex-direction:column; gap:11px;}
  .p-progress{position:relative; height:5px; border-radius:3px; background:rgba(255,255,255,.16);}
  .p-buf{position:absolute; inset:0 auto 0 0; border-radius:3px; background:rgba(255,255,255,.14);}
  .p-fill{position:absolute; inset:0 auto 0 0; border-radius:3px; background:var(--brand);}
  .p-knob{position:absolute; top:50%; width:15px; height:15px; border-radius:50%; background:#fff;
    transform:translate(-50%,-50%); box-shadow:0 0 12px rgba(124,108,255,.9);}
  .p-row{display:flex; align-items:center; gap:18px; color:#e8e4f6; font-size:14px;}
  .p-row svg{display:block;}
  .p-time{font-variant-numeric:tabular-nums; font-size:14.5px; color:#cfc9e6;}
  .p-spacer{flex:1;}
  .p-title{position:absolute; left:22px; top:18px; font-size:17px; font-weight:600; color:#fff;
    text-shadow:0 2px 10px rgba(0,0,0,.8); display:flex; gap:10px; align-items:center;}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--btnB);}

  /* extension-style HUD pill */
  .hud{position:absolute; left:50%; bottom:64px; transform:translateX(-50%); z-index:5;
    display:flex; align-items:center; gap:13px; background:rgba(14,11,24,.88);
    border:1px solid rgba(124,108,255,.45); border-radius:999px; padding:11px 20px;
    box-shadow:0 10px 40px rgba(0,0,0,.6);}
  .hud .lbl{font-size:16px; font-weight:600; color:var(--lilac); white-space:nowrap;}
  .hud .bar{position:relative; width:170px; height:7px; border-radius:4px; background:#2c2542;}
  .hud .bar i{position:absolute; inset:0 auto 0 0; border-radius:4px; background:var(--brand); display:block;}
  .hud .pct{font-size:16px; font-weight:700; color:#fff; min-width:44px; text-align:right; font-variant-numeric:tabular-nums;}

  .floater{position:absolute; font-family:"Bahnschrift","Segoe UI",sans-serif; font-weight:700;
    color:#fff; text-shadow:0 0 18px var(--brand); pointer-events:none; z-index:6;}

  /* ---------- toast (like content.js) ---------- */
  .toast{position:absolute; display:flex; align-items:center; gap:11px;
    background:rgba(18,14,30,.92); border:1px solid rgba(124,108,255,.5); border-radius:13px;
    padding:13px 22px; font-size:17px; font-weight:600; color:var(--tv);
    box-shadow:0 14px 50px rgba(0,0,0,.65);}
  .toast .dot{width:10px; height:10px; border-radius:50%; background:var(--green); box-shadow:0 0 10px var(--green);}

  /* ---------- article page ---------- */
  .article{position:absolute; left:0; right:0; padding:44px 70px; color:#d9d4ea;}
  .art-eyebrow{font-size:13px; letter-spacing:2.5px; color:var(--brand-soft); font-weight:700; margin-bottom:14px;}
  .article h1{font-family:"Bahnschrift","Segoe UI",sans-serif; font-stretch:85%; font-size:44px; color:#fff; margin-bottom:10px;}
  .art-meta{font-size:14px; color:var(--dim); margin-bottom:26px;}
  .art-img{height:250px; border-radius:14px; margin-bottom:28px; overflow:hidden; position:relative;
    background:linear-gradient(150deg,#2b1f45 0%, #4a2b52 45%, #7c4b58 75%, #c88a5e 100%);}
  .art-img .bowl{position:absolute; left:50%; top:58%; width:300px; height:170px; transform:translate(-50%,-40%);
    border-radius:0 0 150px 150px; background:linear-gradient(#3a2b52,#241d33); border:4px solid #56487a; border-top:none;}
  .art-img .steam{position:absolute; width:5px; height:60px; border-radius:3px; background:linear-gradient(rgba(255,255,255,0), rgba(255,255,255,.4)); filter:blur(2px);}
  .article p{font-size:17.5px; line-height:1.75; margin-bottom:20px; color:#bdb6d6;}
  .skl{height:13px; border-radius:7px; background:#241d33; margin-bottom:14px;}
  .art-btn{display:inline-flex; align-items:center; gap:10px; padding:13px 26px; border-radius:12px;
    background:var(--panel2); border:1.5px solid var(--line); color:#fff; font-size:17px; font-weight:600;}
  .art-btn.hover{background:var(--brand); border-color:var(--brand-soft); box-shadow:0 8px 34px rgba(124,108,255,.5);}

  /* virtual cursor */
  .vcur{position:absolute; z-index:30; width:26px; height:26px; margin:-13px 0 0 -13px; pointer-events:none;}
  .vcur .c1{position:absolute; inset:0; border-radius:50%; border:2.5px solid #fff;
    background:rgba(124,108,255,.85); box-shadow:0 0 18px rgba(124,108,255,.9);}
  .vcur .ripple{position:absolute; left:50%; top:50%; width:26px; height:26px; margin:-13px 0 0 -13px;
    border-radius:50%; border:2.5px solid var(--brand-soft); opacity:0;}

  /* ---------- music grid ---------- */
  .music{position:absolute; inset:0; padding:38px 56px; background:#0d0a16;}
  .music h2{font-family:"Bahnschrift","Segoe UI",sans-serif; font-size:30px; margin-bottom:6px;}
  .music .sub{color:var(--dim); font-size:14.5px; margin-bottom:26px;}
  .mgrid{display:grid; grid-template-columns:repeat(4,1fr); gap:22px;}
  .alb{border-radius:12px; overflow:hidden;}
  .alb .cover{height:130px;}
  .alb .t1{height:11px; border-radius:6px; background:#2c2542; margin:12px 0 8px; width:75%;}
  .alb .t2{height:9px; border-radius:5px; background:#221c30; width:50%;}

  /* ---------- options / remap scene ---------- */
  .optWrap{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:940px;}
  .optTitle{font-family:"Bahnschrift","Segoe UI",sans-serif; font-stretch:80%; font-weight:700;
    font-size:64px; color:#fff; margin-bottom:8px;}
  .optSub{font-size:21px; color:var(--dim); margin-bottom:34px;}
  .optRow{display:flex; align-items:center; gap:18px; background:var(--panel);
    border:1px solid #2c2542; border-radius:15px; padding:15px 22px; margin-bottom:13px;}
  .optRow .glyphs{display:flex; align-items:center; gap:9px; min-width:150px;}
  .bglyph{display:inline-flex; align-items:center; justify-content:center; min-width:38px; height:38px;
    padding:0 10px; border-radius:10px; background:var(--panel2); border:1px solid var(--line);
    font-family:"Bahnschrift","Segoe UI",sans-serif; font-weight:700; font-size:17px; color:#fff;}
  .bglyph.round{border-radius:50%; width:38px; padding:0;}
  .optRow .plus{color:var(--dim); font-weight:700;}
  .optRow .arrow{color:var(--brand-soft); font-size:20px;}
  .optRow .act{font-size:19px; font-weight:600; color:var(--lilac);}
  .optRow .tag{margin-left:auto; font-size:12.5px; letter-spacing:1.6px; font-weight:700; color:var(--dim);}
  .optRow.combo{border-color:var(--brand); box-shadow:0 0 0 1px var(--brand), 0 10px 44px rgba(124,108,255,.35);}
  .optRow.combo .tag{color:var(--brand-soft);}

  /* ---------- text blocks ---------- */
  .hero-title{font-family:"Bahnschrift","Segoe UI",sans-serif; font-stretch:78%; font-weight:700;
    font-size:96px; letter-spacing:1px; color:#fff; line-height:.98;
    text-shadow:0 6px 60px rgba(124,108,255,.35);}
  .hero-tag{font-size:26px; color:var(--lilac); font-weight:500; letter-spacing:.3px;}
  .kicker{font-size:15px; letter-spacing:5px; font-weight:700; color:var(--brand-soft);}
  .cta{display:inline-flex; align-items:center; gap:12px; padding:16px 34px; border-radius:999px;
    background:linear-gradient(160deg,#8d7dff,#6d5cf0); color:#fff; font-size:22px; font-weight:700;
    box-shadow:0 18px 60px -8px rgba(124,108,255,.65);}
  .plat{font-size:17px; color:var(--dim); letter-spacing:.5px;}
  .plat b{color:var(--lilac); font-weight:600;}

  .padWrap{position:absolute; transform-style:preserve-3d;}
  .shadowDisc{position:absolute; border-radius:50%; background:radial-gradient(closest-side, rgba(0,0,0,.65), transparent 70%);}
</style>
</head>
<body>
<div id="stage">
  <div class="amb" id="ambA" style="width:700px;height:520px;left:-180px;top:-160px;background:rgba(124,108,255,.10);"></div>
  <div class="amb" id="ambB" style="width:800px;height:600px;right:-220px;bottom:-220px;background:rgba(93,70,200,.12);"></div>

  <div class="scene" id="s1"><div class="cw"></div></div>
  <div class="scene" id="s2"><div class="cw"></div></div>
  <div class="scene" id="s3"><div class="cw"></div></div>
  <div class="scene" id="s4"><div class="cw"></div></div>
  <div class="scene" id="s5"><div class="cw"></div></div>
  <div class="scene" id="s6"><div class="cw"></div></div>
  <div class="scene" id="s7"><div class="cw"></div></div>
  <div class="scene" id="s8"><div class="cw"></div></div>

  <div id="flash"></div>
  <div id="vignette"></div>
  <div id="fade"></div>
</div>

<script>
/* ============================================================
   Couch Controller promo — deterministic timeline.
   window.seek(t) renders the exact frame for time t (seconds).
   ============================================================ */
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
const lerp=(a,b,u)=>a+(b-a)*u;
const E={
  linear:u=>u,
  outCubic:u=>1-Math.pow(1-u,3),
  inCubic:u=>u*u*u,
  inOut:u=>u<.5?4*u*u*u:1-Math.pow(-2*u+2,3)/2,
  outQuint:u=>1-Math.pow(1-u,5),
  outBack:u=>{const c=1.70158;return 1+(c+1)*Math.pow(u-1,3)+c*Math.pow(u-1,2);},
};
function seg(t,a,b,e){e=e||E.inOut;return e(clamp((t-a)/(b-a),0,1));}
/* quick press pulse: 0→1→0 */
function press(t,at,dur){dur=dur||0.24;if(t<at||t>at+dur)return 0;const u=(t-at)/dur;return u<.32?E.outCubic(u/.32):1-E.inCubic((u-.32)/.68);}
/* steps: how many events in list have fired by t */
function fired(t,list){let n=0;for(const a of list)if(t>=a)n++;return n;}

/* ---------------- controller SVG ---------------- */
const NS='http://www.w3.org/2000/svg';
function makePad(){
  const el=document.createElement('div');
  el.className='padWrap';
  el.innerHTML=`
  <svg viewBox="0 0 640 400" width="640" height="400" style="overflow:visible;display:block">
    <defs>
      <filter id="fglow" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="10"/>
      </filter>
      <linearGradient id="bodyG" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#2b2340"/><stop offset=".55" stop-color="#241d33"/><stop offset="1" stop-color="#1c1628"/>
      </linearGradient>
      <radialGradient id="sheen" cx=".5" cy=".1" r=".9">
        <stop offset="0" stop-color="rgba(255,255,255,.13)"/><stop offset=".5" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
    </defs>

    <!-- triggers -->
    <g data-p="lt"><rect class="pk" x="146" y="6" width="84" height="34" rx="15" fill="#1c1628" stroke="#3a3153" stroke-width="2"/>
      <rect class="ov" x="146" y="6" width="84" height="34" rx="15" fill="#7c6cff" opacity="0"/>
      <circle class="gl" cx="188" cy="23" r="34" fill="#7c6cff" opacity="0" filter="url(#fglow)"/>
      <text x="188" y="29" text-anchor="middle" font-family="Bahnschrift,Segoe UI" font-weight="700" font-size="17" fill="#8f86b8" class="tlbl">LT</text></g>
    <g data-p="rt"><rect class="pk" x="410" y="6" width="84" height="34" rx="15" fill="#1c1628" stroke="#3a3153" stroke-width="2"/>
      <rect class="ov" x="410" y="6" width="84" height="34" rx="15" fill="#7c6cff" opacity="0"/>
      <circle class="gl" cx="452" cy="23" r="34" fill="#7c6cff" opacity="0" filter="url(#fglow)"/>
      <text x="452" y="29" text-anchor="middle" font-family="Bahnschrift,Segoe UI" font-weight="700" font-size="17" fill="#8f86b8" class="tlbl">RT</text></g>
    <!-- bumpers -->
    <g data-p="lb"><rect class="pk" x="120" y="48" width="136" height="26" rx="13" fill="#1c1628" stroke="#3a3153" stroke-width="2"/>
      <rect class="ov" x="120" y="48" width="136" height="26" rx="13" fill="#7c6cff" opacity="0"/>
      <circle class="gl" cx="188" cy="61" r="36" fill="#7c6cff" opacity="0" filter="url(#fglow)"/>
      <text x="188" y="67" text-anchor="middle" font-family="Bahnschrift,Segoe UI" font-weight="700" font-size="16" fill="#8f86b8" class="tlbl">LB</text></g>
    <g data-p="rb"><rect class="pk" x="384" y="48" width="136" height="26" rx="13" fill="#1c1628" stroke="#3a3153" stroke-width="2"/>
      <rect class="ov" x="384" y="48" width="136" height="26" rx="13" fill="#7c6cff" opacity="0"/>
      <circle class="gl" cx="452" cy="61" r="36" fill="#7c6cff" opacity="0" filter="url(#fglow)"/>
      <text x="452" y="73" text-anchor="middle" font-family="Bahnschrift,Segoe UI" font-weight="700" font-size="16" fill="#8f86b8" class="tlbl">RB</text></g>

    <!-- body -->
    <g>
      <ellipse cx="146" cy="240" rx="78" ry="128" fill="url(#bodyG)" transform="rotate(18 146 240)"/>
      <ellipse cx="494" cy="240" rx="78" ry="128" fill="url(#bodyG)" transform="rotate(-18 494 240)"/>
      <rect x="112" y="78" width="416" height="188" rx="94" fill="url(#bodyG)"/>
      <rect x="112" y="78" width="416" height="188" rx="94" fill="url(#sheen)"/>
      <rect x="112" y="78" width="416" height="188" rx="94" fill="none" stroke="#3a3153" stroke-width="2"/>
    </g>

    <!-- left stick -->
    <g data-p="l3">
      <circle cx="196" cy="152" r="42" fill="#141020" stroke="#3a3153" stroke-width="2"/>
      <circle class="gl" cx="196" cy="152" r="40" fill="#7c6cff" opacity="0" filter="url(#fglow)"/>
      <g class="nub"><circle class="pk" cx="196" cy="152" r="28" fill="#2c2440" stroke="#453a66" stroke-width="2"/>
        <circle class="ov" cx="196" cy="152" r="28" fill="#7c6cff" opacity="0"/>
        <circle cx="196" cy="146" r="17" fill="rgba(255,255,255,.06)"/></g>
    </g>
    <!-- right stick -->
    <g data-p="r3">
      <circle cx="394" cy="228" r="42" fill="#141020" stroke="#3a3153" stroke-width="2"/>
      <circle class="gl" cx="394" cy="228" r="40" fill="#7c6cff" opacity="0" filter="url(#fglow)"/>
      <g class="nub"><circle class="pk" cx="394" cy="228" r="28" fill="#2c2440" stroke="#453a66" stroke-width="2"/>
        <circle class="ov" cx="394" cy="228" r="28" fill="#7c6cff" opacity="0"/>
        <circle cx="394" cy="222" r="17" fill="rgba(255,255,255,.06)"/></g>
    </g>

    <!-- d-pad -->
    <g data-p="du"><rect class="pk" x="232" y="196" width="30" height="34" rx="8" fill="#171224" stroke="#3a3153" stroke-width="2"/>
      <rect class="ov" x="232" y="196" width="30" height="34" rx="8" fill="#7c6cff" opacity="0"/>
      <circle class="gl" cx="247" cy="213" r="26" fill="#7c6cff" opacity="0" filter="url(#fglow)"/>
      <path d="M247 206 l7 10 h-14 z" fill="#8f86b8" class="tlbl"/></g>
    <g data-p="dd"><rect class="pk" x="232" y="240" width="30" height="34" rx="8" fill="#171224" stroke="#3a3153" stroke-width="2"/>
      <rect class="ov" x="232" y="240" width="30" height="34" rx="8" fill="#7c6cff" opacity="0"/>
      <circle class="gl" cx="247" cy="257" r="26" fill="#7c6cff" opacity="0" filter="url(#fglow)"/>
      <path d="M247 264 l7 -10 h-14 z" fill="#8f86b8" class="tlbl"/></g>
    <g data-p="dl"><rect class="pk" x="210" y="220" width="34" height="30" rx="8" fill="#171224" stroke="#3a3153" stroke-width="2"/>
      <rect class="ov" x="210" y="220" width="34" height="30" rx="8" fill="#7c6cff" opacity="0"/>

/* state: {a,b,x,y,du,dd,dl,dr,lb,rb,lt,rt,l3,r3: 0..1, ls:{x,y}, rs:{x,y}} */
function setPad(el,st){
  for(const k in el._parts){
    const p=st[k]||0, g=el._parts[k];
    const gl=g.querySelector('.gl'), ov=g.querySelector('.ov'), pk=g.querySelectorAll('.pk');
    if(gl) gl.setAttribute('opacity',(p*0.95).toFixed(3));
    if(ov) ov.setAttribute('opacity',(p*0.95).toFixed(3));
    const dy=(k==='lt'||k==='rt')?p*6:p*2.5;
    g.setAttribute('transform',`translate(0 ${dy.toFixed(2)})`);
    const fl=g.querySelector('.flbl'); if(fl) fl.setAttribute('fill', p>0.4?'#ffffff':({y:'#e0c05f',a:'#59c87a',x:'#5f8fe0',b:'#e0645f'})[k]);
    const tl=g.querySelector('.tlbl'); if(tl){ if(tl.tagName==='text') tl.setAttribute('fill',p>0.4?'#fff':'#8f86b8'); else tl.setAttribute('fill',p>0.4?'#fff':'#8f86b8'); }
  }
  const ls=st.ls||{x:0,y:0}, rs=st.rs||{x:0,y:0};
  el._parts.l3.querySelector('.nub').setAttribute('transform',`translate(${(ls.x*13).toFixed(1)} ${(ls.y*13).toFixed(1)})`);
  el._parts.r3.querySelector('.nub').setAttribute('transform',`translate(${(rs.x*13).toFixed(1)} ${(rs.y*13).toFixed(1)})`);
}

/* ---------- S2 · play / pause (A) ---------- */
(function(){
  const {br,pl,pad}=buildAVScene('s2',{bx:120,by:52,bw:860,bh:560,
    padCss:'left:740px;top:330px;width:600px;transform-origin:50% 50%;'});
  const chip=makeChip('<span class="glyph round" style="border-color:#59c87a;color:#59c87a">A</span>','<b>Play / pause</b> any video');
  $('#s2').appendChild(chip);
  S.s2={pad,render(tl){
    const p1=8.6-6, p2=12.1-6;                       // A presses (local)
    const pA=Math.max(press(tl,p1),press(tl,p2));
    setPad(pad,{a:pA});
    pad.style.transform=`rotateX(26deg) rotateY(-14deg) rotate(-4deg)`;
    const playing=tl>=p1+0.1&&tl<p2+0.1;
    const prog=playing?(tl-(p1+0.1))*3.2:(tl>=p2+0.1?(p2-p1)*3.2:0);
    /* center icon burst on state change */
    let ci, cs=1;
    if(tl<p1+0.1){ci=1;}
    else{const b=Math.max(press(tl,p1+0.1,0.7),press(tl,p2+0.1,0.7));ci=b;cs=1+ (1-b)*0.5;}
    setPlayer(pl,{playing,prog:14+prog,total:746,vol:.6,centerIcon:ci,centerScale:cs,drift:seg(tl,2.7,7.5,E.linear)});
    chipIn(chip,seg(tl,3.4,4.0,E.outBack)*(1-seg(tl,7.0,7.5)));
    /* camera: wide → punch in on A → back wide */
    const aEl=pad._parts.a;
    const zoomIn=seg(tl,1.6,2.35), zoomOut=seg(tl,3.0,3.8);
    const u=zoomIn-zoomOut*zoomIn;   /* 0 wide, 1 on button */
    const sW=1.02+seg(tl,0,7.5,E.linear)*0.02;
    if(u<0.001) return {px:640,py:360,s:sW,r:0};
    /* measure A center with camera identity */
    return {focus:aEl,u,sWide:sW,sTight:3.1,rTight:-6};
  }};
})();

/* ---------- S3 · volume (d-pad) ---------- */
(function(){
  const {br,pl,pad}=buildAVScene('s3',{bx:390,by:64,bw:820,bh:540,
    padCss:'left:-10px;top:200px;width:640px;'});
  const cw=$('#s3 .cw');
  const hud=document.createElement('div'); hud.className='hud';
  hud.style.left='660px'; hud.style.bottom='150px'; hud.style.transform='none';
  hud.innerHTML=`<svg width="21" height="21" viewBox="0 0 48 48"><path d="M8 18 h9 l11 -9 v30 l-11 -9 h-9 z" fill="#c9c2ff"/><path class="hw1" d="M33 17 a10 10 0 0 1 0 14" stroke="#c9c2ff" stroke-width="3.4" fill="none" stroke-linecap="round"/><path class="hw2" d="M38 12 a17 17 0 0 1 0 24" stroke="#c9c2ff" stroke-width="3.4" fill="none" stroke-linecap="round"/></svg>
    <span class="lbl">Volume</span><span class="bar"><i></i></span><span class="pct">40%</span>`;
  cw.appendChild(hud);
  const chip=makeChip('<span class="glyph">✚</span>','<b>D-pad</b> — volume up / down');
  $('#s3').appendChild(chip);
  const UPS=[15.0,15.6,16.2,16.8].map(a=>a-13.5), DOWN=18.7-13.5;
  S.s3={pad,render(tl){
    let pu=0; for(const a of UPS) pu=Math.max(pu,press(tl,a));
    const pd=press(tl,DOWN);
    setPad(pad,{du:pu,dd:pd});
    pad.style.transform=`rotateX(30deg) rotateY(11deg) rotate(3deg)`;
    pad.parentElement.style.perspective='1500px';
    let vol=40+fired(tl,UPS)*10-fired(tl,[DOWN])*10;
    /* animate bar toward target */
    const steps=[...UPS.map(a=>({a,d:+10})),{a:DOWN,d:-10}].sort((x,y)=>x.a-y.a);
    let v=40; for(const st of steps){ v+=st.d*seg(tl,st.a,st.a+0.28,E.outCubic); }
    hud.querySelector('.bar i').style.width=v+'%';
    hud.querySelector('.pct').textContent=Math.round(v)+'%';
    hud.querySelector('.hw1').style.opacity=v>15?1:.25;
    hud.querySelector('.hw2').style.opacity=v>55?1:.25;

    hud.style.opacity=uh; hud.style.transform=`translateY(${(1-uh)*18}px)`;
    setPlayer(pl,{playing:true,prog:34+tl*3.2,total:746,vol:v/100,centerIcon:0,drift:seg(tl,0,7,E.linear)});
    chipIn(chip,seg(tl,0.7,1.3,E.outBack)*(1-seg(tl,6.5,7.0)));
    /* camera: dutch drift down-left so d-pad and volume HUD share the frame */
    const u=seg(tl,0.4,1.4)*(1-seg(tl,4.8,5.8));
    return {px:lerp(640,600,u),py:lerp(360,452,u),s:lerp(1.03,1.38,u),r:lerp(-1.2,2.2,u)};
  }};
})();

/* ---------- S4 · seek (triggers) ---------- */
(function(){
  const {br,pl,pad}=buildAVScene('s4',{bx:110,by:40,bw:900,bh:580,
    padCss:'left:660px;top:300px;width:680px;'});
  const cw=$('#s4 .cw');
  const chip=makeChip('<span class="glyph">RT</span><span class="glyph">LT</span>','<b>Seek</b> ±10 seconds');
  $('#s4').appendChild(chip);
  const RTs=[22.0,23.1,24.0].map(a=>a-20.5), LT=25.6-20.5;
  S.s4={pad,cw,render(tl){
    let prt=0; for(const a of RTs) prt=Math.max(prt,press(tl,a,0.3));
    const plt=press(tl,LT,0.3);
    setPad(pad,{rt:prt,lt:plt});
    pad.style.transform=`rotateX(46deg) rotate(-2deg)`;
    pad.parentElement.style.perspective='1300px';
    /* progress: base advance + eased jumps */
    let prog=68+tl*1.0;
    for(const a of RTs) prog+=10*seg(tl,a+0.05,a+0.4,E.outCubic);
    prog-=10*seg(tl,LT+0.05,LT+0.4,E.outCubic);
    setPlayer(pl,{playing:true,prog,total:746,vol:.7,centerIcon:0,drift:seg(tl,0,6.5,E.linear)});
    /* floaters */
    const evs=[...RTs.map(a=>({a,txt:'+10s'})),{a:LT,txt:'−10s'}];
    let fl=this._fl;
    if(!fl){fl=this._fl=evs.map(e=>{const d=document.createElement('div');d.className='floater';d.style.fontSize='44px';cw.appendChild(d);d.textContent=e.txt;return d;});}
    evs.forEach((e,i)=>{
      const u=seg(tl,e.a+0.05,e.a+0.9,E.outCubic);
      const vis=(tl>=e.a+0.02&&tl<=e.a+1.1)?1:0;
      fl[i].style.opacity=vis*(1-seg(tl,e.a+0.7,e.a+1.05));
      const pctX=110+900*clamp((68+tl+10*(i+1)*(e.txt[0]==='+'?1:0))/746,0,1);
      fl[i].style.left=(e.txt[0]==='+'?560+i*40:480)+'px';
      fl[i].style.top=(508-u*66)+'px';
      fl[i].style.color=e.txt[0]==='+'?'#fff':'#ffb3ae';
    });
    chipIn(chip,seg(tl,0.6,1.2,E.outBack)*(1-seg(tl,5.9,6.4)));
    /* camera: start tight overhead on RT, pull out wide before presses 2-3 */
    const u=1-seg(tl,1.9,3.2);
    return {focus:pad._parts.rt,u:u*0.9,sWide:1.02,sTight:2.6,rTight:5,rWide:0};
  }};
})();

/* ============================================================
   TIMELINE + CAMERA
   ============================================================ */
const TL=[
  {id:'s1',t0:0.0,t1:6.0},
  {id:'s2',t0:6.0,t1:13.5},
  {id:'s3',t0:13.5,t1:20.5},
  {id:'s4',t0:20.5,t1:27.0},
  {id:'s5',t0:27.0,t1:34.0},
  {id:'s6',t0:34.0,t1:41.5},
  {id:'s7',t0:41.5,t1:47.0},
  {id:'s8',t0:47.0,t1:53.0},
];
const XF=0.38; /* crossfade */
const FLASHES=[8.6,12.1,15.0,15.6,16.2,16.8,18.7,22.0,23.1,24.0,25.6,28.5,30.3,32.1,39.65];

function applyCam(cwEl,cam){
  if(cam.focus){
    /* measure focus element at camera identity, then blend wide↔tight */
    cwEl.style.transform='none';
    const r=cam.focus.getBoundingClientRect();
    const fx=r.left+r.width/2, fy=r.top+r.height/2;
    const u=cam.u;
    const px=lerp(cam.pxW!==undefined?cam.pxW:640,fx,u);
    const py=lerp(cam.pyW!==undefined?cam.pyW:360,fy,u);
    const s=lerp(cam.sWide,cam.sTight,E.inOut(u));
    const rot=lerp(cam.rWide||0,cam.rTight||0,u);
    cwEl.style.transform=`translate(640px,360px) scale(${s.toFixed(4)}) rotate(${rot.toFixed(2)}deg) translate(${(-px).toFixed(1)}px,${(-py).toFixed(1)}px)`;
  }else{
    cwEl.style.transform=`translate(640px,360px) scale(${cam.s.toFixed(4)}) rotate(${(cam.r||0).toFixed(2)}deg) translate(${(-cam.px).toFixed(1)}px,${(-cam.py).toFixed(1)}px)`;
  }
}

window.seek=function(t){
  for(const sc of TL){
    const el=document.getElementById(sc.id);
    const vis=t>=sc.t0-XF&&t<=sc.t1+XF;
    el.style.visibility=vis?'visible':'hidden';
    if(!vis){el.style.opacity=0;continue;}
    const op=seg(t,sc.t0-XF*0.5,sc.t0+XF*0.5)*(1-seg(t,sc.t1-XF*0.5,sc.t1+XF*0.5));
    el.style.opacity=(sc.t0===0?1-seg(t,sc.t1-XF*0.5,sc.t1+XF*0.5):op).toFixed(3);
    const cam=S[sc.id].render(t-sc.t0);
    applyCam(el.querySelector('.cw'),cam);
  }
  /* ambient drift */
  document.getElementById('ambA').style.transform=`translate(${Math.sin(t*0.21)*40}px, ${Math.cos(t*0.17)*30}px)`;
  document.getElementById('ambB').style.transform=`translate(${Math.cos(t*0.19)*-45}px, ${Math.sin(t*0.23)*28}px)`;
  /* room flash on presses */
  let f=0; for(const a of FLASHES) f=Math.max(f,press(t,a,0.5));
  document.getElementById('flash').style.opacity=(f*0.7).toFixed(3);
  /* final fade + opening fade-in */
  const fade=Math.max(seg(t,52.3,53.0), 1-seg(t,0,0.45));
  document.getElementById('fade').style.opacity=fade.toFixed(3);
};
window.DURATION=53.0;
seek(0);
/* preview mode: ?t=12.3 renders a single frame; ?play=1 live-plays */
const q=new URLSearchParams(location.search);
if(q.get('t')!==null) seek(parseFloat(q.get('t')));
if(q.get('play')){const st=performance.now();(function loop(){const t=((performance.now()-st)/1000)%window.DURATION;seek(t);requestAnimationFrame(loop);})();}
